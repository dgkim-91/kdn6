<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KDN6 - OpenAI 설정 도구</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
    }
    .card {
      background: rgba(255,255,255,0.1);
      backdrop-filter: blur(10px);
      border-radius: 16px;
      padding: 48px 40px;
      max-width: 480px;
      width: 90%;
      text-align: center;
      border: 1px solid rgba(255,255,255,0.2);
      box-shadow: 0 8px 32px rgba(0,0,0,0.3);
    }
    .icon { font-size: 56px; margin-bottom: 16px; }
    h1 { font-size: 28px; font-weight: 700; margin-bottom: 8px; }
    .subtitle { font-size: 15px; opacity: 0.85; margin-bottom: 32px; line-height: 1.6; }
    .features { text-align: left; margin-bottom: 32px; }
    .feature {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 0;
      border-bottom: 1px solid rgba(255,255,255,0.15);
      font-size: 14px;
    }
    .feature:last-child { border-bottom: none; }
    .feature-icon { font-size: 20px; }
    .btn {
      display: inline-block;
      background: #fff;
      color: #764ba2;
      font-size: 16px;
      font-weight: 600;
      padding: 14px 32px;
      border-radius: 50px;
      text-decoration: none;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 4px 15px rgba(0,0,0,0.2);
    }
    .btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0,0,0,0.3); }
    .note { margin-top: 20px; font-size: 12px; opacity: 0.7; }
    .badge {
      display: inline-block;
      background: rgba(255,255,255,0.2);
      border-radius: 20px;
      padding: 4px 12px;
      font-size: 12px;
      margin-bottom: 24px;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">⚙️</div>
    <div class="badge">KDN6 Project</div>
    <h1>OpenAI 설정 도구</h1>
    <p class="subtitle">OpenAI API 키와 모델을 간편하게 설정하고<br/>연결 상태를 확인하세요.</p>
    <div class="features">
      <div class="feature">
        <span class="feature-icon">🔑</span>
        <span>API 키 안전 저장 및 마스킹 표시</span>
      </div>
      <div class="feature">
        <span class="feature-icon">🤖</span>
        <span>GPT-4o, GPT-4, o1 등 모델 선택</span>
      </div>
      <div class="feature">
        <span class="feature-icon">🔌</span>
        <span>실시간 API 연결 테스트</span>
      </div>
      <div class="feature">
        <span class="feature-icon">🎛️</span>
        <span>Temperature / Max Tokens 고급 설정</span>
      </div>
    </div>
    <a class="btn" href="#">로컬에서 실행하기</a>
    <p class="note">터미널에서 <code>streamlit run app.py</code> 실행 후 접속하세요.</p>
  </div>
</body>
</html>
